services:
  postgres:
    image: postgres:16-alpine
    container_name: scheduler-postgres
    environment:
      POSTGRES_DB: scheduler
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scheduler-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: scheduler-backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://scheduler:scheduler@postgres:5432/scheduler?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: replace-with-a-long-access-token-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      REFRESH_TOKEN_DAYS: "30"
      BCRYPT_SALT_ROUNDS: "12"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
    container_name: scheduler-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
